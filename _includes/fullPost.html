<link rel="stylesheet" href="/assets/css/fullPost.css" />

<div class="fullPost">
    <h1 class="fullPost__title">{{ page.title }}</h1>
    <time class="fullPost__date" datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ page.date | date: "%-d %B %Y" }}</time>
    <div class="fullPost__content">{{ content }}</div>
</div>
